services:
  - type: web
    name: super-excel
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT app:app
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: SUPABASE_URL
        value: https://kndibdwueoviukqpwmbx.supabase.co
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: SUPABASE_TABLE
        value: workbooks
      - key: SUPABASE_TIMEOUT
        value: "15"
