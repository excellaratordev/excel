name: Build Rust Wasm dynamic arrays

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build-dynamic-arrays:
    if: github.head_ref == 'engine/rust-wasm-dynamic-arrays-v7' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout dynamic arrays branch
        uses: actions/checkout@v4
        with:
          ref: engine/rust-wasm-dynamic-arrays-v7
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Configure Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add wasm32-unknown-unknown
          rustup component add rustfmt

      - name: Apply and validate dynamic arrays
        run: |
          set +e
          mkdir -p .phase
          status=0
          python .phase/apply_dynamic_arrays.py > .phase/dynamic-arrays-validation.log 2>&1 || status=$?
          if [ "$status" = "0" ]; then cargo fmt --manifest-path wasm-engine/Cargo.toml >> .phase/dynamic-arrays-validation.log 2>&1 || status=$?; fi
          if [ "$status" = "0" ]; then cargo test --manifest-path wasm-engine/Cargo.toml >> .phase/dynamic-arrays-validation.log 2>&1 || status=$?; fi
          if [ "$status" = "0" ]; then sh scripts/build_wasm.sh >> .phase/dynamic-arrays-validation.log 2>&1 || status=$?; fi
          if [ "$status" = "0" ]; then test -s static/wasm/superexcel_wasm_engine.wasm || status=$?; fi
          if [ "$status" = "0" ]; then node --check static/js/wasm/engine-contract.js >> .phase/dynamic-arrays-validation.log 2>&1 || status=$?; fi
          if [ "$status" = "0" ]; then node --check static/js/wasm/formula-engine.js >> .phase/dynamic-arrays-validation.log 2>&1 || status=$?; fi
          if [ "$status" = "0" ]; then node --test tests/js/formula-ir.test.js tests/js/platform-foundation.test.js >> .phase/dynamic-arrays-validation.log 2>&1 || status=$?; fi
          if [ "$status" = "0" ]; then node tests/js/wasm-engine.integration.mjs static/wasm/superexcel_wasm_engine.wasm >> .phase/dynamic-arrays-validation.log 2>&1 || status=$?; fi
          if [ "$status" = "0" ]; then python -m pip install --quiet pytest >> .phase/dynamic-arrays-validation.log 2>&1 || status=$?; fi
          if [ "$status" = "0" ]; then pytest -q tests/test_wasm_frontend.py >> .phase/dynamic-arrays-validation.log 2>&1 || status=$?; fi
          echo "$status" > .phase/dynamic-arrays-validation.exit
          cat .phase/dynamic-arrays-validation.log
          exit 0

      - name: Persist implementation and diagnostics
        run: |
          status="$(cat .phase/dynamic-arrays-validation.exit)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ "$status" = "0" ]; then
            rm -f .phase/apply_dynamic_arrays.py \
                  .phase/dynamic-arrays-validation.log \
                  .phase/dynamic-arrays-validation.exit \
                  .github/workflows/build-rust-wasm-dynamic-arrays.yml
            message="feat(wasm): add dynamic arrays and spill planning"
          else
            message="build(wasm): persist dynamic arrays diagnostics"
          fi
          git add -A
          git commit -m "$message"
          git pull --rebase origin engine/rust-wasm-dynamic-arrays-v7
          git push origin HEAD:engine/rust-wasm-dynamic-arrays-v7

      - name: Enforce validation result
        run: test "$(cat .phase/dynamic-arrays-validation.exit 2>/dev/null || echo 0)" = "0"
