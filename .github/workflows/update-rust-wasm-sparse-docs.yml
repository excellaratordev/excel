name: Update Rust Wasm sparse docs

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  update-sparse-docs:
    if: github.head_ref == 'engine/rust-wasm-sparse-range-v5' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: engine/rust-wasm-sparse-range-v5
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Finalize roadmap
        run: python .phase/update_sparse_range_docs.py

      - name: Commit clean documentation
        run: |
          rm -f .phase/update_sparse_range_docs.py \
                .phase/sparse-doc-validation.log \
                .phase/sparse-doc-validation.exit \
                .github/workflows/update-rust-wasm-sparse-docs.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs(wasm): finalize ABI 6 sparse range documentation"
          git pull --rebase origin engine/rust-wasm-sparse-range-v5
          git push origin HEAD:engine/rust-wasm-sparse-range-v5
