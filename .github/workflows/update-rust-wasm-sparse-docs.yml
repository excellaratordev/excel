name: Update Rust Wasm sparse docs

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  update-sparse-docs:
    if: github.head_ref == 'engine/rust-wasm-sparse-range-v5' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: engine/rust-wasm-sparse-range-v5
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply and capture documentation updates
        run: |
          set +e
          python .phase/update_sparse_range_docs.py > .phase/sparse-doc-validation.log 2>&1
          status=$?
          echo "$status" > .phase/sparse-doc-validation.exit
          cat .phase/sparse-doc-validation.log
          exit 0

      - name: Persist documentation and diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs(wasm): persist sparse documentation progress"
          git pull --rebase origin engine/rust-wasm-sparse-range-v5
          git push origin HEAD:engine/rust-wasm-sparse-range-v5

      - name: Enforce documentation result
        run: test "$(cat .phase/sparse-doc-validation.exit)" = "0"
