name: Update ABI 4 documentation

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  update-docs:
    if: github.head_ref == 'engine/rust-wasm-business-functions-ir-v3'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: engine/rust-wasm-business-functions-ir-v3
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Reconstruct and apply documentation update
        run: |
          cat .phase/update_abi4_docs.py.gz.b64.00 \
              .phase/update_abi4_docs.py.gz.b64.01 \
              .phase/update_abi4_docs.py.gz.b64.02 > /tmp/update_abi4_docs.b64
          base64 --decode /tmp/update_abi4_docs.b64 > /tmp/update_abi4_docs.py.gz
          echo "f32d07732f2febcabc28b0357bc41accf3eebe44b8e36ac6b53e10915cdd5fc5  /tmp/update_abi4_docs.py.gz" | sha256sum --check
          gzip --decompress --stdout /tmp/update_abi4_docs.py.gz > /tmp/update_abi4_docs.py
          echo "ae6a0224060b3e605ff448f56df1946ff4571201e6f166035371a3362f672f70  /tmp/update_abi4_docs.py" | sha256sum --check
          python /tmp/update_abi4_docs.py

      - name: Commit documentation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/CURRENT_STATUS.md docs/ARCHITECTURE.md docs/RUST_WASM_ROADMAP.md wasm-engine/README.md
          git commit -m "docs: update Rust Wasm ABI 4 and business functions"
          git pull --rebase origin engine/rust-wasm-business-functions-ir-v3
          git push origin HEAD:engine/rust-wasm-business-functions-ir-v3
