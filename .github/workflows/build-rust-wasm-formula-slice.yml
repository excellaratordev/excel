name: Build Rust Wasm formula slice

on:
  push:
    branches:
      - engine/rust-wasm-formula-slice-v1
    paths:
      - .github/workflows/build-rust-wasm-formula-slice.yml
      - .rust_source/**

permissions:
  contents: write

jobs:
  build-engine:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout engine branch
        uses: actions/checkout@v4
        with:
          ref: engine/rust-wasm-formula-slice-v1
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Configure Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add wasm32-unknown-unknown
          rustup component add rustfmt

      - name: Reconstruct Rust source and browser wiring
        run: |
          cat .rust_source/lib.rs.gz.b64.* | base64 --decode | gzip --decompress > wasm-engine/src/lib.rs
          echo "caa9be327a39ed2b68937bb29f3d5fc581cf37b5e1aa7473bf01dd7246db47d8  wasm-engine/src/lib.rs" | sha256sum --check
          python - <<'PY'
          from pathlib import Path

          def replace_once(path, old, new):
              file = Path(path)
              text = file.read_text(encoding='utf-8')
              if new in text:
                  return
              if old not in text:
                  raise SystemExit(f'Âncora não encontrada em {path}: {old[:80]!r}')
              file.write_text(text.replace(old, new, 1), encoding='utf-8')

          replace_once(
              'templates/index.html',
              "  <script src=\"{{ url_for('static', filename='js/calculation/formula-catalog.js') }}\"></script>\n  <script src=\"{{ url_for('static', filename='js/calculation/formula-runtime.js') }}\"></script>",
              "  <script src=\"{{ url_for('static', filename='js/calculation/formula-catalog.js') }}\"></script>\n  <script src=\"{{ url_for('static', filename='js/wasm/engine-contract.js') }}\"></script>\n  <script src=\"{{ url_for('static', filename='js/wasm/formula-engine.js') }}\"></script>\n  <script src=\"{{ url_for('static', filename='js/calculation/formula-runtime.js') }}\"></script>",
          )

          replace_once(
              '.github/workflows/ci.yml',
              "          rustup target add wasm32-unknown-unknown\n          rustc --version",
              "          rustup target add wasm32-unknown-unknown\n          rustup component add rustfmt\n          rustc --version",
          )
          replace_once(
              '.github/workflows/ci.yml',
              "          node --check static/js/wasm/engine-contract.js\n",
              "          node --check static/js/wasm/engine-contract.js\n          node --check static/js/wasm/formula-engine.js\n",
          )
          replace_once(
              '.github/workflows/ci.yml',
              "      - name: Validate Rust contract\n        run: |\n          cargo test --manifest-path wasm-engine/Cargo.toml\n          cargo build --manifest-path wasm-engine/Cargo.toml --target wasm32-unknown-unknown --release\n          test -s wasm-engine/target/wasm32-unknown-unknown/release/superexcel_wasm_engine.wasm\n",
              "      - name: Validate Rust/Wasm formula engine\n        run: |\n          cargo fmt --manifest-path wasm-engine/Cargo.toml -- --check\n          cargo test --manifest-path wasm-engine/Cargo.toml\n          sh scripts/build_wasm.sh\n          test -s static/wasm/superexcel_wasm_engine.wasm\n          node tests/js/wasm-engine.integration.mjs static/wasm/superexcel_wasm_engine.wasm\n          pytest -q tests/test_wasm_frontend.py\n",
          )

          platform = Path('tests/js/platform-foundation.test.js')
          text = platform.read_text(encoding='utf-8')
          text = text.replace("test('contrato Wasm começa na ABI 1', () => assert.equal(ABI_VERSION, 1));", "test('contrato Wasm funcional usa ABI 2', () => assert.equal(ABI_VERSION, 2));")
          platform.write_text(text, encoding='utf-8')

          gitignore = Path('.gitignore')
          text = gitignore.read_text(encoding='utf-8')
          if 'wasm-engine/target/' not in text:
              gitignore.write_text(text.rstrip() + '\nwasm-engine/target/\n', encoding='utf-8')

          readme = Path('README.md')
          text = readme.read_text(encoding='utf-8')
          old = """## Rust/WebAssembly\n\nO diretório `wasm-engine/` contém a fundação atual:\n\n- ABI versão 1;\n- alocação e desalocação de memória;\n- validação de envelopes de operações;\n- testes Rust;\n- build para `wasm32-unknown-unknown` na CI.\n\nEle ainda não substitui o runtime JavaScript. A fronteira está documentada em [`docs/ADR-001-CUSTOM-CALCULATION-ENGINE.md`](docs/ADR-001-CUSTOM-CALCULATION-ENGINE.md).\n"""
          new = """## Rust/WebAssembly\n\nA primeira fatia funcional está implementada em `wasm-engine/`:\n\n- ABI versão 2 com entrada e saída JSON tipadas;\n- parser e AST próprios em Rust;\n- avaliação de referências e intervalos locais, operadores e funções básicas;\n- integração experimental `off`, `shadow` e `prefer`;\n- fallback automático para JavaScript em recursos ainda não suportados;\n- testes Rust e execução real do binário Wasm na CI.\n\nO grafo, cache, funções avançadas e referências externas continuam no runtime JavaScript. Consulte [`docs/RUST_WASM_ROADMAP.md`](docs/RUST_WASM_ROADMAP.md).\n"""
          if old in text:
              readme.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          cargo fmt --manifest-path wasm-engine/Cargo.toml || true

      - name: Validate implementation
        id: validate
        continue-on-error: true
        run: |
          cargo test --manifest-path wasm-engine/Cargo.toml
          sh scripts/build_wasm.sh
          node tests/js/wasm-engine.integration.mjs static/wasm/superexcel_wasm_engine.wasm
          node --check static/js/wasm/engine-contract.js
          node --check static/js/wasm/formula-engine.js
          node --check static/js/calculation/runtime-bridge.js
          node --test tests/js/*.test.js
          python -m pip install pytest
          pytest -q tests/test_wasm_frontend.py

      - name: Commit generated engine
        if: always()
        run: |
          rm -rf .rust_source
          rm -f .github/workflows/build-rust-wasm-formula-slice.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Implementar primeira fatia funcional do motor Rust/Wasm"
          git push origin HEAD:engine/rust-wasm-formula-slice-v1

      - name: Fail when validation failed
        if: steps.validate.outcome == 'failure'
        run: exit 1
