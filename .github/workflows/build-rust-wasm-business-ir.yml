name: Build Rust Wasm business IR

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build-business-ir:
    if: github.head_ref == 'engine/rust-wasm-business-functions-ir-v3'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout engine branch
        uses: actions/checkout@v4
        with:
          ref: engine/rust-wasm-business-functions-ir-v3
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Configure Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add wasm32-unknown-unknown
          rustup component add rustfmt

      - name: Apply ABI 4 and capture diagnostics
        run: |
          set +e
          mkdir -p .phase
          {
            echo "== decode package =="
            base64 --decode .phase/apply_wasm_business_ir.py.gz.b64 | gzip --decompress > /tmp/apply_wasm_business_ir.py
            decode_status=$?
            echo "decode_status=$decode_status"
            if [ "$decode_status" -eq 0 ]; then
              echo "== execute patch =="
              python /tmp/apply_wasm_business_ir.py
              status=$?
            else
              status=$decode_status
            fi
            echo "apply_status=$status"
          } > .phase/apply-business-ir.log 2>&1
          echo "$status" > .phase/apply-business-ir.exit
          cat .phase/apply-business-ir.log
          exit 0

      - name: Commit generated files and diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes or diagnostics"
            exit 0
          fi
          git commit -m "build(wasm): apply ABI 4 phase or persist diagnostics"
          git pull --rebase origin engine/rust-wasm-business-functions-ir-v3
          git push origin HEAD:engine/rust-wasm-business-functions-ir-v3

      - name: Enforce apply result
        run: |
          test "$(cat .phase/apply-business-ir.exit)" = "0"

      - name: Validate Rust, IR parity and browser integration
        run: |
          python -m pip install --quiet pytest
          cargo fmt --manifest-path wasm-engine/Cargo.toml
          cargo test --manifest-path wasm-engine/Cargo.toml
          sh scripts/build_wasm.sh
          test -s static/wasm/superexcel_wasm_engine.wasm
          node --check static/js/calculation/formula-parser.js
          node --check static/js/wasm/engine-contract.js
          node --check static/js/wasm/formula-engine.js
          node --check static/js/calculation/runtime-bridge.js
          node --test tests/js/formula-ir.test.js tests/js/platform-foundation.test.js
          node tests/js/wasm-engine.integration.mjs static/wasm/superexcel_wasm_engine.wasm
          pytest -q tests/test_wasm_frontend.py

      - name: Commit compiled ABI 4 engine
        run: |
          rm -f .phase/apply-business-ir.log .phase/apply-business-ir.exit
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No generated changes"
            exit 0
          fi
          git commit -m "feat(wasm): add business functions and shared IR"
          git pull --rebase origin engine/rust-wasm-business-functions-ir-v3
          git push origin HEAD:engine/rust-wasm-business-functions-ir-v3
