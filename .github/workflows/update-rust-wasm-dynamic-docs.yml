name: Update Rust Wasm dynamic docs

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  update-dynamic-docs:
    if: github.head_ref == 'engine/rust-wasm-dynamic-arrays-v7' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: engine/rust-wasm-dynamic-arrays-v7
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply ABI 7 documentation
        run: python .phase/update_dynamic_arrays_docs.py

      - name: Commit clean documentation
        run: |
          rm -f .phase/update_dynamic_arrays_docs.py .github/workflows/update-rust-wasm-dynamic-docs.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs(wasm): document ABI 7 dynamic arrays and spill planning"
          git pull --rebase origin engine/rust-wasm-dynamic-arrays-v7
          git push origin HEAD:engine/rust-wasm-dynamic-arrays-v7
