name: Apply instant load fix

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-fix:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout patch branch
        uses: actions/checkout@v4
        with:
          ref: fix/instant-load
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Restore and apply patch
        run: |
          base64 --decode .instant_patch/apply_instant_load_fix.py.gz.b64 | gzip --decompress > /tmp/apply_instant_load_fix.py
          python /tmp/apply_instant_load_fix.py .

      - name: Run focused tests
        continue-on-error: true
        run: python -m pytest tests/test_instant_load_frontend.py

      - name: Commit applied changes
        run: |
          rm -rf .instant_patch
          rm -f .github/workflows/apply-instant-load-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Otimizar carregamento inicial do Super Excel"
          git push origin HEAD:fix/instant-load
