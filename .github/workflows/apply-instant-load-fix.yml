name: Apply instant load fix

on:
  push:
    branches:
      - fix/instant-load
    paths:
      - .github/workflows/apply-instant-load-fix.yml

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/instant-load
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Restore patch script
        run: |
          base64 --decode .instant_patch/apply_instant_load_fix.py.gz.b64 | gzip --decompress > /tmp/apply_instant_load_fix.py
          python /tmp/apply_instant_load_fix.py .

      - name: Run focused tests
        run: python -m pytest tests/test_instant_load_frontend.py

      - name: Commit applied changes
        run: |
          rm -rf .instant_patch
          rm -f .github/workflows/apply-instant-load-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Otimizar carregamento inicial do Super Excel"
          git push origin HEAD:fix/instant-load
