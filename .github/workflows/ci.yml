name: Super Excel CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Configure Rust and Wasm target
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add wasm32-unknown-unknown
          rustc --version
          cargo --version

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Build local web dependencies
        run: |
          npm install --omit=dev
          mkdir -p static/vendor
          cp node_modules/@supabase/supabase-js/dist/umd/supabase.js static/vendor/supabase.js
          test -s static/vendor/supabase.js

      - name: Validate Python syntax
        run: >-
          python -m compileall -q
          app.py asset_routes.py backend.py capability_backend.py projects_routes.py files_routes.py
          workbook_routes.py base_routes.py base_reference_routes.py base_elementar_automation.py
          collaboration_routes.py recovery_routes.py roles_routes.py snapshot_routes.py performance_cache.py
          telemetry_routes.py github_connector.py github_oauth.py github_sites.py elementar_routes.py
          elementar_automation_routes.py elementar_automation_values.py elementar_realtime_delivery.py superexcel

      - name: Run Base pipeline and reference tests
        run: >-
          pytest -q
          tests/test_file_pipeline.py
          tests/test_base_pipeline_frontend.py
          tests/test_base_reference_routes.py
          tests/test_base_reference_panel_frontend.py

      - name: Run existing backend and architecture tests
        run: |
          mkdir -p artifacts
          set -o pipefail
          pytest -q --tb=short \
            --ignore=tests/test_file_pipeline.py \
            --ignore=tests/test_base_pipeline_frontend.py \
            --ignore=tests/test_base_reference_routes.py \
            --ignore=tests/test_base_reference_panel_frontend.py \
            2>&1 | tee artifacts/backend-tests.log

      - name: Publish backend test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-diagnostics
          path: artifacts/backend-tests.log
          if-no-files-found: error
          retention-days: 7

      - name: Validate JavaScript syntax
        run: |
          node --check static/vendor/supabase.js
          node --check static/js/auth-guard.js
          node --check static/js/login.js
          node --check static/js/auth-callback.js
          node --check static/js/file-pipeline-manager.js
          node --check static/js/manager-ui.js
          node --check static/js/roles-manager.js
          node --check static/js/github-connector.js
          node --check static/js/elementar-manager.js
          node --check static/js/base-grid.js
          node --check static/js/base-reference-panel.js
          node --check static/js/base-reference-focus-bridge.js
          node --check static/js/elementar-sheet.js
          node --check static/js/elementar-source-sync.js
          node --check static/js/elementar-auto-publish-client.js
          node --check static/js/formula-glossary.js
          node --check static/js/calculation/formula-parser.js
          node --check static/js/calculation/dependency-graph.js
          node --check static/js/calculation/function-library.js
          node --check static/js/calculation/formula-catalog.js
          node --check static/js/calculation/formula-runtime.js
          node --check static/js/calculation/external-reference-runtime.js
          node --check static/js/calculation/logical-library.js
          node --check static/js/calculation/logical-localization-ptbr.js
          node --check static/js/calculation/enterprise-kernel.js
          node --check static/js/calculation/runtime-bridge.js
          node --check static/js/calculation/render-bridge.js
          node --check static/js/collab-operation.js
          node --check static/js/collab-operation-store.js
          node --check static/js/snapshot-boot.js
          node --check static/js/snapshot-manager.js
          node --check static/js/grid/sparse-store.js
          node --check static/js/grid/viewport.js
          node --check static/js/grid/interaction.js
          node --check static/js/sheet-capabilities.js
          node --check static/js/sheet-bootstrap-v2.js
          node --check static/js/app-v3.js
          node --check static/js/sheet-collaboration-v3.js
          node --check static/js/performance-telemetry.js
          node --check static/js/wasm/engine-contract.js
          node --check benchmarks/calculation-benchmarks.js
          node --check benchmarks/logical-benchmarks.js
          node --check benchmarks/collaboration-simulator.js

      - name: Run JavaScript tests
        run: |
          mkdir -p artifacts
          set -o pipefail
          node --test tests/js/*.test.js 2>&1 | tee artifacts/javascript-tests.log

      - name: Publish JavaScript test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: javascript-test-diagnostics
          path: artifacts/javascript-tests.log
          if-no-files-found: error
          retention-days: 7

      - name: Execute C1-C5 calculation benchmarks
        run: node benchmarks/calculation-benchmarks.js --profile ci --output artifacts/calculation-benchmarks.json

      - name: Execute L1-L5 logical benchmarks
        run: node benchmarks/logical-benchmarks.js --profile ci --output artifacts/logical-benchmarks.json

      - name: Execute R1-R5 collaboration simulation
        run: node benchmarks/collaboration-simulator.js --output artifacts/collaboration-simulation.json

      - name: Validate Rust contract
        run: |
          cargo test --manifest-path wasm-engine/Cargo.toml
          cargo build --manifest-path wasm-engine/Cargo.toml --target wasm32-unknown-unknown --release
          test -s wasm-engine/target/wasm32-unknown-unknown/release/superexcel_wasm_engine.wasm

      - name: Validate migration contracts
        run: |
          test -s supabase/migrations/20260717022658_architecture_completion.sql
          test -s supabase/migrations/20260717061000_harden_architecture_tables.sql
          test -s supabase/migrations/20260717070000_publish_github_html_subdomains.sql
          test -s supabase/migrations/20260717081500_elementar_automatic_publication.sql
          test -s supabase/migrations/20260717083000_backfill_elementar_dependencies.sql
          test -s supabase/migrations/20260717102000_create_four_stage_file_pipeline.sql
          grep -q "create table if not exists public.project_roles" supabase/migrations/20260717022658_architecture_completion.sql
          grep -q "enable row level security" supabase/migrations/20260717061000_harden_architecture_tables.sql
          grep -q "github_connections_site_slug_uidx" supabase/migrations/20260717070000_publish_github_html_subdomains.sql
          grep -q "create table if not exists public.elementar_dependencies" supabase/migrations/20260717081500_elementar_automatic_publication.sql
          grep -q "jsonb_array_elements" supabase/migrations/20260717083000_backfill_elementar_dependencies.sql
          grep -q "create table if not exists public.base_columns" supabase/migrations/20260717102000_create_four_stage_file_pipeline.sql
          grep -q "create table if not exists public.base_rows" supabase/migrations/20260717102000_create_four_stage_file_pipeline.sql
          grep -q "create table if not exists public.file_dependencies" supabase/migrations/20260717102000_create_four_stage_file_pipeline.sql
          grep -q "workbooks_file_pipeline_check" supabase/migrations/20260717102000_create_four_stage_file_pipeline.sql
          grep -q "elementar_dependencies_validate_stage" supabase/migrations/20260717102000_create_four_stage_file_pipeline.sql
          grep -q "referencing new table as new_rows" supabase/migrations/20260717102000_create_four_stage_file_pipeline.sql

      - name: Ensure production runtime and same-origin assets
        run: |
          ! grep -Rni "hyperformula" templates static/js README.md
          ! grep -Rni "cdn.jsdelivr.net/npm/@supabase/supabase-js" templates
          ! grep -Rni "static/vendor/supabase.js" templates
          grep -Rni "assets_api.supabase_browser_client" templates
          grep -Rni "sheet-bootstrap-v2.js" templates/index.html
          grep -Rni "app-v3.js" static/js/sheet-bootstrap-v2.js
          test ! -e static/js/app.js
          test ! -e static/js/app-v2.js
          test ! -e static/js/app-loader.js
          test ! -e static/js/sheet-bootstrap.js
          for obsolete in "js/app.js" "js/app-v2.js" "js/app-loader.js" "js/sheet-bootstrap.js"; do
            ! grep -RniF "$obsolete" templates app.py static/js tests docs README.md
          done
          grep -Rni "external-reference-runtime.js" templates/index.html
          grep -Rni "base-reference-panel.js" templates/index.html
          grep -Rni "base-reference-focus-bridge.js" templates/index.html
          grep -Rni "base-reference-panel.css" templates/index.html
          grep -Rni "elementar-source-sync.js" templates/index.html
          grep -Rni "elementar-auto-publish-client.js" templates/index.html
          grep -Rni "base-grid.js" templates/base.html
          grep -Rni "pipeline-manager.css" templates/manager.html
          grep -Rni "file-pipeline-manager.js" static/js/elementar-manager.js
          ! grep -Rni "formula-runtime.js" templates/base.html
          ! grep -Rni "runtime-bridge.js" templates/base.html

      - name: Publish benchmark evidence
        uses: actions/upload-artifact@v4
        with:
          name: platform-validation-results
          path: artifacts/*.json
          if-no-files-found: error
          retention-days: 30
