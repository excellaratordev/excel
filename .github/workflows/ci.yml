name: Super Excel CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Build local web dependencies
        run: |
          npm install --omit=dev
          mkdir -p static/vendor
          cp node_modules/@supabase/supabase-js/dist/umd/supabase.js static/vendor/supabase.js
          test -s static/vendor/supabase.js

      - name: Validate Python syntax
        run: >-
          python -m compileall -q
          app.py asset_routes.py backend.py capability_backend.py projects_routes.py files_routes.py
          workbook_routes.py collaboration_routes.py recovery_routes.py roles_routes.py snapshot_routes.py
          performance_cache.py telemetry_routes.py github_connector.py github_oauth.py superexcel

      - name: Run backend tests
        run: pytest -q

      - name: Validate JavaScript syntax
        run: |
          node --check static/vendor/supabase.js
          node --check static/js/auth-guard.js
          node --check static/js/login.js
          node --check static/js/auth-callback.js
          node --check static/js/manager-ui.js
          node --check static/js/github-connector.js
          node --check static/js/calculation/formula-parser.js
          node --check static/js/calculation/dependency-graph.js
          node --check static/js/calculation/function-library.js
          node --check static/js/calculation/formula-runtime.js
          node --check static/js/calculation/runtime-bridge.js
          node --check static/js/calculation/render-bridge.js
          node --check static/js/collab-operation.js
          node --check static/js/collab-operation-store.js
          node --check static/js/snapshot-boot.js
          node --check static/js/snapshot-manager.js
          node --check static/js/grid/sparse-store.js
          node --check static/js/grid/viewport.js
          node --check static/js/grid/interaction.js
          node --check static/js/sheet-capabilities.js
          node --check static/js/sheet-bootstrap-v2.js
          node --check static/js/app-v2.js
          node --check static/js/app-v3.js
          node --check static/js/sheet-collaboration-v3.js
          node --check static/js/performance-telemetry.js

      - name: Run calculation runtime tests
        run: node --test tests/js/*.test.js

      - name: Ensure browser assets are same-origin
        run: |
          ! grep -Rni "hyperformula" templates static/js README.md
          ! grep -Rni "cdn.jsdelivr.net/npm/@supabase/supabase-js" templates
          ! grep -Rni "static/vendor/supabase.js" templates
          grep -Rni "assets_api.supabase_browser_client" templates
          grep -Rni "sheet-bootstrap-v2.js" templates/index.html
