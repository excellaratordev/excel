<!doctype html>
<html lang="pt-BR" data-workbook-id="{{ preload_workbook_id or '' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Super Excel: planilha web colaborativa com motor de cálculo incremental próprio.">
  <title>Super Excel</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/collaboration.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/snapshot.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/virtual-grid.css') }}">
</head>
<body class="auth-pending sheet-loading">
  <div id="snapshot-layer" class="snapshot-layer" hidden aria-label="Pré-visualização instantânea da planilha"></div>
  <script src="{{ url_for('static', filename='js/snapshot-boot.js') }}"></script>
  <header class="topbar">
    <div class="brand"><span class="brand-mark">S</span><div><strong>Super Excel</strong><small>Planilha colaborativa</small></div></div>
    <input id="workbook-name" class="workbook-name" value="Minha Planilha" maxlength="120" aria-label="Nome da planilha">
    <div class="collaboration-summary" aria-live="polite">
      <div id="collaborators" class="collaborators"></div>
      <div><strong id="collaboration-state">Conectando...</strong><small id="collaboration-detail">Sincronização automática</small></div>
    </div>
    <div class="top-actions">
      <button type="button" onclick="location.href='/files'">Arquivos</button>
      <button id="new-button" type="button">Nova</button>
      <button id="open-button" type="button">Abrir</button>
      <button id="save-button" type="button" class="primary">Salvar</button>
      <button id="functions-button" type="button">30 fórmulas</button>
      <div class="auth-user">
        <img class="auth-avatar" data-auth-avatar src="" alt="">
        <div class="auth-user-text"><strong data-auth-name>Conta Google</strong><span data-auth-email></span></div>
        <button class="auth-signout" type="button" data-auth-signout>Sair</button>
      </div>
    </div>
  </header>
  <main>
    <section class="toolbar" aria-label="Ferramentas da planilha">
      <button id="undo-button" type="button" title="Desfazer (Ctrl+Z)">↶</button>
      <button id="redo-button" type="button" title="Refazer (Ctrl+Y)">↷</button>
      <span class="separator"></span>
      <button id="clear-button" type="button">Limpar célula</button>
      <button id="example-button" type="button">Carregar exemplo</button>
      <span class="separator"></span>
      <button id="export-button" type="button">Exportar JSON</button>
      <label class="file-button" for="import-input">Importar JSON</label>
      <input id="import-input" type="file" accept="application/json,.json" hidden>
    </section>
    <section class="formula-row"><div id="cell-address" class="cell-address">A1</div><div class="fx">fx</div><input id="formula-input" type="text" spellcheck="false" autocomplete="off" aria-label="Barra de fórmulas" placeholder="Digite um valor ou fórmula, por exemplo: =SOMA(A1:A5)"></section>
    <section class="sheet-shell"><div id="spreadsheet" class="spreadsheet" role="grid" aria-label="Planilha"></div></section>
    <footer class="statusbar"><span id="status-message">Carregando...</span><span id="selection-summary"></span><span>SuperExcel Runtime 0.2 · esparso e incremental</span></footer>
  </main>
  <dialog id="functions-dialog" class="dialog functions-dialog"><div class="dialog-header"><div><h2>30 fórmulas disponíveis</h2><p>Use ponto e vírgula <code>;</code> entre argumentos.</p></div><button class="icon-button" data-close-dialog="functions-dialog" aria-label="Fechar">×</button></div><div id="functions-list" class="functions-list"></div></dialog>
  <dialog id="open-dialog" class="dialog open-dialog"><div class="dialog-header"><div><h2>Abrir planilha</h2><p>Arquivos disponíveis nos seus projetos.</p></div><button class="icon-button" data-close-dialog="open-dialog" aria-label="Fechar">×</button></div><div id="workbooks-list" class="workbooks-list"></div></dialog>
  <p data-auth-error class="error-text" hidden></p>
  <script src="{{ url_for('assets_api.supabase_browser_client') }}"></script>
  <script src="{{ url_for('static', filename='js/auth-guard.js') }}"></script>
  <script src="{{ url_for('static', filename='js/calculation/formula-parser.js') }}"></script>
  <script src="{{ url_for('static', filename='js/calculation/dependency-graph.js') }}"></script>
  <script src="{{ url_for('static', filename='js/calculation/function-library.js') }}"></script>
  <script src="{{ url_for('static', filename='js/calculation/formula-runtime.js') }}"></script>
  <script src="{{ url_for('static', filename='js/calculation/runtime-bridge.js') }}"></script>
  <script src="{{ url_for('static', filename='js/calculation/render-bridge.js') }}"></script>
  <script src="{{ url_for('static', filename='js/snapshot-manager.js') }}"></script>
  <script src="{{ url_for('static', filename='js/sheet-bootstrap-v2.js') }}"></script>
  <script src="{{ url_for('static', filename='js/performance-telemetry.js') }}"></script>
</body>
</html>
